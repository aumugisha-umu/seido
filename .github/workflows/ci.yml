name: CI
on:
  push:
    branches: [main, preview]
  pull_request:
    branches: [main, preview]
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npx next lint --max-warnings -1
