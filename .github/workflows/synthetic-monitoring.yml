name: Synthetic Monitoring

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

env:
  NODE_VERSION: '20'

jobs:
  production-smoke:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - name: Run production smoke tests
        run: npx playwright test tests/monitoring/ --config tests/e2e/playwright.config.ts --project=smoke
        env:
          CI: true
          E2E_BASE_URL: https://app.seido.be
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      - name: Notify Slack on failure
        if: failure()
        uses: slackapi/slack-github-action@v2.0.0
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": ":rotating_light: *Production Smoke Test Failed*\nWorkflow: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\nTimestamp: ${{ github.event.head_commit.timestamp || 'scheduled' }}"
            }
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: monitoring-report
          path: tests/e2e/playwright-report/
          retention-days: 7
